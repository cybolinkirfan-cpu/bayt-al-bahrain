<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post an Ad | Bayt Al Bahrain</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .step-indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .step-item.active .step-indicator {
            background: var(--brand-red);
            color: white;
            border-color: var(--brand-red);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
        }

        .step-connector {
            flex-grow: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 15px;
        }

        .category-radio:checked+.category-card {
            border-color: var(--brand-red) !important;
            background: rgba(220, 38, 38, 0.05) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) !important;
        }

        .category-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="bg-light">

    <!-- Header Section -->
    <header class="main-header">
        <div class="container-xxl">
            <div class="d-flex justify-content-between align-items-center h-100">
                <!-- Logo Section -->
                <div class="d-flex align-items-center gap-3">
                    <a href="index.html" class="d-flex align-items-center gap-3 text-decoration-none">
                        <img src="./assets/images/logo.png" class="header-logo-img" width="220" alt="Bayt Al Bahrain">
                    </a>
                </div>

                <!-- Right Actions -->
                <div class="d-flex align-items-center gap-4">
                    <a href="index.html"
                        class="btn btn-link text-decoration-none text-secondary fw-800 d-flex align-items-center gap-2 p-0 text-uppercase tracking-widest"
                        style="font-size: 0.75rem;">
                        <span class="material-symbols-outlined fs-5">close</span>
                        <span>Cancel</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="mt-5 pt-4">
        <div class="container py-5" style="max-width: 900px;">

            <!-- Stepper (Dark Premium) -->
            <div
                class="glass-effect p-4 p-md-5 rounded-4 shadow-premium border border-white border-opacity-10 mb-5 overflow-hidden">
                <div class="d-flex align-items-center justify-content-between px-md-5">
                    <div class="step-item active d-flex flex-column align-items-center gap-3">
                        <div class="step-indicator">1</div>
                        <span class="small fw-800 text-secondary text-uppercase tracking-widest d-none d-md-block"
                            style="font-size: 0.65rem;">Category</span>
                    </div>
                    <div class="step-connector"></div>
                    <div class="step-item d-flex flex-column align-items-center gap-3">
                        <div class="step-indicator">2</div>
                        <span class="small fw-800 text-muted text-uppercase tracking-widest d-none d-md-block"
                            style="font-size: 0.65rem;">Details</span>
                    </div>
                    <div class="step-connector"></div>
                    <div class="step-item d-flex flex-column align-items-center gap-3">
                        <div class="step-indicator">3</div>
                        <span class="small fw-800 text-muted text-uppercase tracking-widest d-none d-md-block"
                            style="font-size: 0.65rem;">Media</span>
                    </div>
                    <div class="step-connector"></div>
                    <div class="step-item d-flex flex-column align-items-center gap-3">
                        <div class="step-indicator">4</div>
                        <span class="small fw-800 text-muted text-uppercase tracking-widest d-none d-md-block"
                            style="font-size: 0.65rem;">Publish</span>
                    </div>
                </div>
            </div>

            <!-- Form Card -->
            <form action="dashboard.html">
                <div class="glass-effect p-4 p-md-5 rounded-4 shadow-premium border border-white border-opacity-10">
                    <div class="mb-5 text-center">
                        <h2 class="h4 fw-800 text-secondary mb-2 text-uppercase tracking-widest">Select Listing Category
                        </h2>
                        <p class="text-muted small fw-bold tracking-widest">PRECISION CLASSIFICATION FOR MAXIMUM REACH
                        </p>
                    </div>

                    <div class="row row-cols-2 row-cols-md-3 g-4 mb-5">
                        <!-- Properties -->
                        <div class="col">
                            <label class="w-100 cursor-pointer">
                                <input type="radio" name="category" class="d-none category-radio" checked>
                                <div
                                    class="category-card p-4 rounded-4 glass-effect border border-white border-opacity-10 text-center h-100 hover-shadow">
                                    <span class="material-symbols-outlined fs-1 text-primary mb-3">apartment</span>
                                    <p class="fw-800 text-secondary text-uppercase tracking-widest mb-0"
                                        style="font-size: 0.75rem;">Properties</p>
                                </div>
                            </label>
                        </div>
                        <!-- Motors -->
                        <div class="col">
                            <label class="w-100 cursor-pointer">
                                <input type="radio" name="category" class="d-none category-radio">
                                <div
                                    class="category-card p-4 rounded-4 glass-effect border border-white border-opacity-10 text-center h-100 hover-shadow">
                                    <span class="material-symbols-outlined fs-1 text-primary mb-3">directions_car</span>
                                    <p class="fw-800 text-secondary text-uppercase tracking-widest mb-0"
                                        style="font-size: 0.75rem;">Vehicles</p>
                                </div>
                            </label>
                        </div>
                        <!-- Electronics -->
                        <div class="col">
                            <label class="w-100 cursor-pointer">
                                <input type="radio" name="category" class="d-none category-radio">
                                <div
                                    class="category-card p-4 rounded-4 glass-effect border border-white border-opacity-10 text-center h-100 hover-shadow">
                                    <span class="material-symbols-outlined fs-1 text-primary mb-3">devices</span>
                                    <p class="fw-800 text-secondary text-uppercase tracking-widest mb-0"
                                        style="font-size: 0.75rem;">Electronics</p>
                                </div>
                            </label>
                        </div>
                        <!-- Home -->
                        <div class="col">
                            <label class="w-100 cursor-pointer">
                                <input type="radio" name="category" class="d-none category-radio">
                                <div
                                    class="category-card p-4 rounded-4 glass-effect border border-white border-opacity-10 text-center h-100 hover-shadow">
                                    <span class="material-symbols-outlined fs-1 text-primary mb-3">chair</span>
                                    <p class="fw-800 text-secondary text-uppercase tracking-widest mb-0"
                                        style="font-size: 0.75rem;">Furniture</p>
                                </div>
                            </label>
                        </div>
                        <!-- Services -->
                        <div class="col">
                            <label class="w-100 cursor-pointer">
                                <input type="radio" name="category" class="d-none category-radio">
                                <div
                                    class="category-card p-4 rounded-4 glass-effect border border-white border-opacity-10 text-center h-100 hover-shadow">
                                    <span class="material-symbols-outlined fs-1 text-primary mb-3">handyman</span>
                                    <p class="fw-800 text-secondary text-uppercase tracking-widest mb-0"
                                        style="font-size: 0.75rem;">Services</p>
                                </div>
                            </label>
                        </div>
                        <!-- Jobs -->
                        <div class="col">
                            <label class="w-100 cursor-pointer">
                                <input type="radio" name="category" class="d-none category-radio">
                                <div
                                    class="category-card p-4 rounded-4 glass-effect border border-white border-opacity-10 text-center h-100 hover-shadow">
                                    <span class="material-symbols-outlined fs-1 text-primary mb-3">work</span>
                                    <p class="fw-800 text-secondary text-uppercase tracking-widest mb-0"
                                        style="font-size: 0.75rem;">Jobs</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label
                            class="form-label small fw-800 text-white text-opacity-50 text-uppercase tracking-widest ms-1">Listing
                            Type</label>
                        <select
                            class="form-select glass-effect border-0 fw-800 text-secondary shadow-sm rounded-pill py-3 px-4">
                            <option>Residential Apartment for Rent</option>
                            <option>Commercial Office for Rent</option>
                            <option>Villa for Sale</option>
                            <option>Land / Plot</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end pt-4 border-top border-secondary border-opacity-10">
                        <button type="submit"
                            class="btn btn-primary px-5 py-3 rounded-pill fw-800 shadow-premium text-uppercase tracking-widest d-flex align-items-center gap-3">
                            Next: Detailed Info
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-5">
        <div class="container text-center">
            <p class="mb-0 text-secondary opacity-50 small fw-bold text-uppercase tracking-widest"
                style="font-size: 0.65rem;">© 2026 Bayt Al Bahrain. Modernizing the Marketplace.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
